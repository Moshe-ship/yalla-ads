<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; }
  .card {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #0F1A3E 0%, #1B2E6E 50%, #0F1A3E 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    direction: rtl;
  }
  .glow {
    position: absolute;
    top: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(230,126,34,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .glow2 {
    position: absolute;
    bottom: -80px;
    left: -80px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(230,126,34,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .content {
    text-align: center;
    z-index: 1;
  }
  .play {
    margin: 0 auto 30px;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 40px 0 40px 70px;
    border-color: transparent transparent transparent #E67E22;
    filter: drop-shadow(0 0 20px rgba(230,126,34,0.4));
  }
  .brand {
    font-size: 72px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .brand span { color: #E67E22; }
  .tagline {
    font-size: 28px;
    color: rgba(255,255,255,0.7);
    font-weight: 400;
  }
  .url {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 2px;
  }
  .border-line {
    position: absolute;
    inset: 20px;
    border: 1px solid rgba(230,126,34,0.15);
    border-radius: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="border-line"></div>
  <div class="content">
    <div class="play"></div>
    <div class="brand">Yalla <span>ADS</span></div>
    <div class="tagline">منوصلك للزبون الصحيح</div>
  </div>
  <div class="url">yalla-ads.com</div>
</div>
</body>
</html>
